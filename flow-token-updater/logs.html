<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="logs.title">Flow Token Updater - 日志</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f12;
            --bg-secondary: #18181c;
            --bg-tertiary: #222228;
            --bg-card: #1a1a1f;
            --accent: #f5a623;
            --accent-glow: rgba(245, 166, 35, 0.15);
            --accent-hover: #ffb84d;
            --text-primary: #f0f0f2;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --border: #2a2a32;
            --success: #4ade80;
            --error: #f87171;
            --info: #60a5fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 420px;
            min-height: 500px;
            padding: 20px;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(245, 166, 35, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(245, 166, 35, 0.05) 0%, transparent 50%);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title::before {
            content: '📋';
        }

        .header-btns {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
        }

        .btn-ghost {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.1);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .log-list {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            max-height: 420px;
            overflow-y: auto;
        }

        .log-list::-webkit-scrollbar {
            width: 6px;
        }

        .log-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-list::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .log-item {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            transition: background 0.2s;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-item:hover {
            background: var(--bg-card);
        }

        .log-time {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }

        .log-level {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .log-level.INFO {
            background: rgba(96, 165, 250, 0.15);
            color: var(--info);
        }

        .log-level.SUCCESS {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
        }

        .log-level.ERROR {
            background: rgba(248, 113, 113, 0.15);
            color: var(--error);
        }

        .log-message {
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .log-details {
            margin-top: 8px;
            padding: 10px;
            background: var(--bg-primary);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }

        .empty {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .empty-icon {
            font-size: 28px;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        /* 语言切换器 */
        .lang-switch {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
        }

        .lang-switch:hover {
            background: var(--bg-card);
            border-color: var(--accent);
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="title" data-i18n="logs.title">运行日志</span>
        <div class="header-right">
            <div class="header-btns">
                <button id="clearBtn" class="btn-danger" data-i18n="clear">清除</button>
                <button id="backBtn" class="btn-ghost" data-i18n="back">返回</button>
            </div>
            <div id="langContainer"></div>
        </div>
    </div>

    <div id="logList" class="log-list">
        <div class="empty">
            <div class="empty-icon">📭</div>
            <span data-i18n="logs.noLogs">暂无日志记录</span>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="logs.js"></script>
</body>
</html>
