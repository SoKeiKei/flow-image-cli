<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="popup.title">Flow Token Updater</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f12;
            --bg-secondary: #18181c;
            --bg-tertiary: #222228;
            --bg-card: #1a1a1f;
            --accent: #f5a623;
            --accent-glow: rgba(245, 166, 35, 0.15);
            --accent-hover: #ffb84d;
            --text-primary: #f0f0f2;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --border: #2a2a32;
            --success: #4ade80;
            --error: #f87171;
            --info: #60a5fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 380px;
            min-height: 420px;
            padding: 20px;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            /* 微妙的大理石纹理背景 */
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(245, 166, 35, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(245, 166, 35, 0.05) 0%, transparent 50%);
        }

        /* 头部区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: url('icon16.png') center/cover no-repeat;
        }

        .title {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        .author a {
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .author a:hover {
            color: var(--accent);
        }

        /* 服务器状态 */
        .server-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: var(--success);
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
        }

        .status-dot.offline {
            background: var(--error);
            box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
            animation: none;
        }

        .status-dot.checking {
            background: var(--accent);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 表单区域 */
        .form-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group:last-of-type {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .hint {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* 按钮区域 */
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #e69520 100%);
            color: #0f0f12;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--text-muted);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            padding: 8px 12px;
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        /* 状态提示 */
        .status {
            margin-top: 14px;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            display: none;
            white-space: pre-wrap;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status.success {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.2);
            display: block;
        }

        .status.error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.2);
            display: block;
        }

        .status.info {
            background: rgba(96, 165, 250, 0.1);
            color: var(--info);
            border: 1px solid rgba(96, 165, 250, 0.2);
            display: block;
        }

        /* Token 列表区域 */
        .token-section {
            margin-top: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: var(--accent);
            border-radius: 2px;
        }

        .token-list {
            max-height: 160px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .token-list::-webkit-scrollbar {
            width: 6px;
        }

        .token-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .token-list::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .token-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .token-item:last-child {
            border-bottom: none;
        }

        .token-item:hover {
            background: var(--bg-card);
        }

        .token-item.expanded {
            background: var(--bg-tertiary);
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .token-time {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .token-length {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .token-preview {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .token-full {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: var(--bg-primary);
            border-radius: 8px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
            color: var(--text-secondary);
            max-height: 80px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .token-item.expanded .token-full {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .copy-btn {
            margin-top: 8px;
            padding: 5px 12px;
            font-size: 11px;
            background: var(--accent);
            color: #0f0f12;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--accent-hover);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .empty {
            padding: 28px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .empty-icon {
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* 底部操作栏 */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .clear-btn {
            font-size: 11px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .clear-btn:hover {
            color: var(--error);
        }

        .version {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* 语言切换器 */
        .lang-switch {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
        }

        .lang-switch:hover {
            background: var(--bg-card);
            border-color: var(--accent);
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">
            <div class="logo"></div>
            <span class="title">Flow Token</span>
        </div>
        <div class="header-right">
            <div class="author">
                <a href="https://space.bilibili.com/3546772855064749" target="_blank">
                    <span>📺</span> 细Kei
                </a>
            </div>
            <div id="langContainer"></div>
        </div>
    </div>

    <div class="server-status" id="serverStatus">
        <span class="status-dot checking"></span>
        <span class="status-text" data-i18n="serverStatus.checking">检测中...</span>
    </div>

    <div class="form-section">
        <div class="form-group">
            <label for="localServerUrl" data-i18n="form.serverUrl">本地服务器</label>
            <input type="text" id="localServerUrl" data-i18n="form.serverUrlPlaceholder" placeholder="http://127.0.0.1:8765/token">
            <div class="hint" data-i18n="form.serverUrlHint">运行 flow-token-server 后填入</div>
        </div>

        <div class="form-group">
            <label for="refreshInterval" data-i18n="form.refreshInterval">刷新间隔</label>
            <input type="number" id="refreshInterval" value="60" min="1" max="1440">
            <div class="hint" data-i18n="form.refreshIntervalHint">单位：分钟</div>
        </div>

        <div class="buttons">
            <button id="saveBtn" class="btn-primary" data-i18n="form.saveConfig">保存配置</button>
            <button id="testBtn" class="btn-secondary" data-i18n="form.fetchNow">立即获取</button>
        </div>
    </div>

    <div id="status" class="status"></div>

    <div class="token-section">
        <div class="section-header">
            <span class="section-title" data-i18n="token.history">Token 历史</span>
        </div>
        <div id="tokenList" class="token-list">
            <div class="empty">
                <div class="empty-icon">📭</div>
                <span data-i18n="token.noRecords">暂无提取记录</span>
            </div>
        </div>
        <div class="footer">
            <button id="logsBtn" class="btn-ghost" data-i18n="token.viewLogs">查看日志</button>
            <button id="clearTokensBtn" class="clear-btn" data-i18n="token.clearHistory">清除历史</button>
            <span class="version">v1.0.0</span>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
</body>
</html>
